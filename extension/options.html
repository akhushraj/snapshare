<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screenshot — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111827;
      color: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .page { width: 480px; max-width: 100%; }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: #18181b;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo h1 { font-size: 22px; font-weight: 700; }
    .logo p  { font-size: 13px; color: #6b7280; margin-top: 2px; }

    .card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 24px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #374151;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .status-text strong { font-size: 14px; display: block; }
    .status-text span   { font-size: 12px; color: #6b7280; }

    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot.green  { background: #34d399; box-shadow: 0 0 6px #34d399; }
    .dot.grey   { background: #4b5563; }

    .btn {
      width: 100%;
      padding: 11px;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.12s;
    }
    .btn-blue { background: #2563eb; color: #fff; }
    .btn-blue:hover { background: #1d4ed8; }
    .btn-blue:disabled { background: #1e3a6e; color: #60a5fa; cursor: default; }
    .btn-gray { background: #374151; color: #9ca3af; margin-top: 10px; }
    .btn-gray:hover { background: #4b5563; }

    .divider { height: 1px; background: #374151; margin: 20px 0; }

    .folder-info {
      font-size: 12px;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #error-msg {
      font-size: 12px;
      color: #fca5a5;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="logo">
    <div class="logo-icon">
      <img src="icons/icon48.png" width="32" height="32" alt="">
    </div>
    <div>
      <h1>Screenshot</h1>
      <p>Settings</p>
    </div>
  </div>

  <div class="card">
    <div class="status-row">
      <div class="avatar" id="avatar">👤</div>
      <div class="status-text">
        <strong id="status-title">Not connected</strong>
        <span id="status-sub">
          <span class="dot grey" id="status-dot"></span>Google Drive not linked
        </span>
      </div>
    </div>

    <button class="btn btn-blue" id="connect-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>

    <div id="disconnect-section" style="display:none">
      <div class="divider"></div>
      <div class="folder-info" id="folder-info">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Saving to <strong style="color:#9ca3af;margin-left:4px">Screenshot</strong> folder in your Drive
      </div>
      <button class="btn btn-gray" id="disconnect-btn">Disconnect Google account</button>
    </div>

    <div id="error-msg"></div>
  </div>
</div>

<script src="options.js"></script>
</body>
</html>
