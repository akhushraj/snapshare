<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screenshot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #111827;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f9fafb;
    }

    /* ── Toolbar ── */
    #toolbar {
      width: 50px;
      background: #1f2937;
      border-right: 1px solid #374151;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 4px;
      gap: 1px;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .tb-divider {
      width: 32px;
      height: 1px;
      background: #374151;
      margin: 2px 0;
      flex-shrink: 0;
    }

    .tool-btn {
      width: 38px;
      height: 36px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: #9ca3af;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
      position: relative;
      flex-shrink: 0;
    }
    .tool-btn:hover { background: #374151; color: #f9fafb; }
    .tool-btn.active { background: #2563eb; color: #fff; }
    .tool-btn.red:hover { background: #7f1d1d; color: #fca5a5; }

    /* Tooltip */
    .tool-btn[title]:hover::after,
    .stroke-btn[title]:hover::after {
      content: attr(title);
      position: fixed;
      left: 54px;
      background: #111827;
      border: 1px solid #374151;
      color: #f9fafb;
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 11px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 999;
    }

    /* Color button + popover */
    #color-btn {
      width: 38px;
      height: 36px;
      border-radius: 7px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    #color-btn:hover { background: #374151; }
    #color-swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #FF3B30;
      border: 2px solid rgba(255,255,255,0.5);
      pointer-events: none;
    }
    #color-popover {
      display: none;
      position: fixed;
      left: 54px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 8px;
      z-index: 500;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #color-popover.visible { display: grid; }
    .cpop-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
    }
    .cpop-dot:hover { transform: scale(1.12); }
    .cpop-dot.active { border-color: #fff; }

    /* Stroke size buttons */
    .stroke-btn {
      width: 38px;
      height: 26px;
      border-radius: 5px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .stroke-btn:hover { background: #374151; }
    .stroke-btn.active { background: #1d4ed8; }
    .stroke-line {
      background: #9ca3af;
      border-radius: 2px;
      width: 100%;
    }
    .stroke-btn.active .stroke-line { background: #fff; }

    /* Share + Clipboard buttons */
    #share-btn, #clip-btn {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
      position: relative;
    }
    #clip-btn, #share-btn { color: #9ca3af; }
    #share-btn:hover, #clip-btn:hover { background: #374151; color: #f9fafb; }
    #share-btn:disabled, #clip-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      padding: 20px;
      background: #111827;
    }

    #main-canvas {
      display: block;
      cursor: crosshair;
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.6);
      flex-shrink: 0;
      align-self: flex-start;
    }

    /* ── Text input overlay ── */
    #text-wrap {
      position: fixed;
      display: none;
      z-index: 50;
    }
    #text-input {
      background: transparent;
      border: none;
      border-bottom: 2px solid currentColor;
      outline: none;
      font-family: Arial, sans-serif;
      font-weight: bold;
      min-width: 80px;
      padding: 0 2px;
    }

    /* ── Modals ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.visible { display: flex; }

    .modal {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 24px;
      width: 460px;
      max-width: 90vw;
      box-shadow: 0 8px 60px rgba(0, 0, 0, 0.5);
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #f9fafb;
    }
    .modal p {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    #url-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    #url-text {
      flex: 1;
      padding: 10px 12px;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 7px;
      color: #60a5fa;
      font-size: 12px;
      word-break: break-all;
      line-height: 1.4;
    }
    #copy-btn {
      padding: 10px 14px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }
    #copy-btn:hover { background: #1d4ed8; }
    #copy-copied {
      display: none;
      font-size: 12px;
      color: #34d399;
      margin-top: 8px;
      text-align: center;
    }
    #modal-close {
      margin-top: 14px;
      width: 100%;
      padding: 9px;
      background: #374151;
      color: #d1d5db;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
    }
    #modal-close:hover { background: #4b5563; }

    /* Status / loading */
    #status-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #status-backdrop.visible { display: flex; }
    #status-box {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 20px 28px;
      text-align: center;
      color: #f9fafb;
      font-size: 14px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #374151;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error banner */
    #error-bar {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #7f1d1d;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 300;
      max-width: 500px;
      text-align: center;
    }

    /* Hint bar */
    #hint-bar {
      position: fixed;
      bottom: 0;
      left: 50px;
      right: 0;
      background: #1f2937;
      border-top: 1px solid #374151;
      padding: 6px 16px;
      font-size: 11px;
      color: #6b7280;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- ── Toolbar ── -->
  <div id="toolbar">
    <!-- Copy to clipboard is the primary action — sits at the top -->
    <button id="clip-btn" title="Copy to Clipboard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="4" rx="1"/>
        <path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/>
      </svg>
    </button>

    <!-- Share to Drive is secondary -->
    <button id="share-btn" title="Share to Google Drive (⌘↵)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    </button>

    <div class="tb-divider"></div>

    <!-- Select / Move -->
    <button class="tool-btn" data-tool="select" title="Select & Move (click annotation to select, drag to move, Delete to remove)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 3l14 9-7 1-4 7z"/>
      </svg>
    </button>

    <!-- Crop / Region -->
    <button class="tool-btn active" data-tool="crop" title="Select Region (drag to define save area)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 3 3 3 3 6"/><polyline points="6 21 3 21 3 18"/>
        <polyline points="18 21 21 21 21 18"/><polyline points="18 3 21 3 21 6"/>
      </svg>
    </button>

    <button class="tool-btn" data-tool="arrow" title="Arrow">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="19" x2="19" y2="5"/>
        <polyline points="14 5 19 5 19 10"/>
      </svg>
    </button>

    <button class="tool-btn" data-tool="rect" title="Rectangle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
      </svg>
    </button>

    <button class="tool-btn" data-tool="circle" title="Circle / Oval">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
      </svg>
    </button>

    <button class="tool-btn" data-tool="text" title="Text">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 7 4 4 20 4 20 7"/>
        <line x1="9" y1="20" x2="15" y2="20"/>
        <line x1="12" y1="4" x2="12" y2="20"/>
      </svg>
    </button>

    <button class="tool-btn" data-tool="pen" title="Freehand Draw">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
      </svg>
    </button>

    <div class="tb-divider"></div>

    <!-- Color picker (click to open popover) -->
    <button id="color-btn" title="Color">
      <div id="color-swatch"></div>
    </button>

    <div class="tb-divider"></div>

    <button class="stroke-btn" data-width="3" title="Thin">
      <div class="stroke-line" style="height:2px"></div>
    </button>
    <button class="stroke-btn" data-width="6" title="Medium">
      <div class="stroke-line" style="height:4px"></div>
    </button>
    <button class="stroke-btn active" data-width="12" title="Thick">
      <div class="stroke-line" style="height:7px"></div>
    </button>

    <div class="tb-divider"></div>

    <button class="tool-btn" id="undo-btn" title="Undo (⌘Z / Ctrl+Z)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
      </svg>
    </button>

    <button class="tool-btn red" id="clear-crop-btn" title="Clear Region Selection">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

  </div>

  <!-- ── Canvas ── -->
  <div id="canvas-wrap">
    <canvas id="main-canvas"></canvas>
  </div>

  <!-- ── Text input ── -->
  <div id="text-wrap">
    <input id="text-input" type="text" placeholder="Type here…" autocomplete="off">
  </div>

  <!-- ── Color popover ── -->
  <div id="color-popover">
    <div class="cpop-dot active" data-color="#FF3B30" style="background:#FF3B30" title="Red"></div>
    <div class="cpop-dot" data-color="#FF9500" style="background:#FF9500" title="Orange"></div>
    <div class="cpop-dot" data-color="#FFCC00" style="background:#FFCC00" title="Yellow"></div>
    <div class="cpop-dot" data-color="#30D158" style="background:#30D158" title="Green"></div>
    <div class="cpop-dot" data-color="#0A84FF" style="background:#0A84FF" title="Blue"></div>
    <div class="cpop-dot" data-color="#FFFFFF" style="background:#fff;border-color:#4b5563" title="White"></div>
    <div class="cpop-dot" data-color="#000000" style="background:#000" title="Black"></div>
    <div class="cpop-dot" data-color="#FF2D55" style="background:#FF2D55" title="Pink"></div>
  </div>

  <!-- ── Share URL modal ── -->
  <div class="modal-backdrop" id="url-modal">
    <div class="modal">
      <h3>Screenshot shared! ✓</h3>
      <p>Anyone with the link can view it. To remove access, delete it from your <a id="drive-folder-link" href="https://drive.google.com/drive/search?q=type:folder+Screenshot" target="_blank" style="color:#60a5fa">Screenshot folder in Drive</a>.</p>
      <div id="url-row">
        <div id="url-text"></div>
        <button id="copy-btn">Copy link</button>
      </div>
      <div id="copy-copied">Copied to clipboard!</div>
      <button id="modal-close">Done</button>
    </div>
  </div>

  <!-- ── Status / loading ── -->
  <div id="status-backdrop">
    <div id="status-box">
      <div class="spinner"></div>
      <div id="status-msg">Uploading…</div>
    </div>
  </div>

  <!-- ── Error bar ── -->
  <div id="error-bar"></div>

  <!-- ── Hint bar ── -->
  <div id="hint-bar">
    <span id="hint-text">Drag to select a region to save — or annotate the full page and click Share.</span>
    <span style="float:right">⌘Z undo &nbsp;·&nbsp; Esc cancel</span>
  </div>

  <script src="editor.js"></script>
</body>
</html>
